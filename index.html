<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Hex Site Selection</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

#panel {
  position:absolute;
  top:20px;
  right:20px;
  width:280px;
  padding:16px;
  background:white;
  z-index:9999;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, select { width:100%; padding:6px; margin-bottom:10px; }

button {
  width:100%;
  padding:10px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:4px;
}

.leaflet-tile-pane {
  filter: grayscale(85%) brightness(96%);
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>
</head>

<body>

<div id="panel">

<h3>Search</h3>
<input id="searchBox">
<button onclick="searchLocation()">Find</button>

<label>Buffer</label>
<select id="buffer">
<option value="25">25m</option>
<option value="50">50m</option>
<option value="75">75m</option>
<option value="100">100m</option>
</select>

<p>Tiles: <span id="tileCount">0</span></p>
<p>Quote: £<span id="quote">0</span></p>

<button onclick="clearAll()">Clear</button>

</div>

<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const map = L.map('map').setView([52.48,-1.89],13);

// ✅ prevent zoom interfering with double-click
map.doubleClickZoom.disable();

map.createPane('hexPane');
map.getPane('hexPane').style.zIndex = 650;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

const drawnItems = new L.FeatureGroup().addTo(map);
const bufferGroup = L.layerGroup().addTo(map);

// ✅ FIXED DRAW CONFIG
const drawControl = new L.Control.Draw({
  draw:{
    polygon:{
      allowIntersection:true,
      showArea:true,
      shapeOptions:{color:'#d12b2b',weight:3}
    },
    polyline:{
      shapeOptions:{color:'#d12b2b',weight:3}
    },
    rectangle:false,
    circle:false,
    marker:false
  }
});
map.addControl(drawControl);

// ✅ DATA
let hexLayers = [];
let selectedHexes = new Set();

// ✅ CLEAR (global)
window.clearAll = function(){
  drawnItems.clearLayers();
  bufferGroup.clearLayers();
  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();
  updateUI();
}

function updateUI(){
  const n = selectedHexes.size;
  tileCount.innerText = n;

  let price;
  if(n<=50) price=n*2.99;
  else if(n<=100) price=n*2.5;
  else if(n<=200) price=n*1.5;
  else if(n<=500) price=n*0.99;
  else price=n*0.49;

  quote.innerText = Math.round(price);
}

function drawHex(h){
  const coords = h3.h3ToGeoBoundary(h,false);
  const poly = L.polygon(coords.map(c=>[c[0],c[1]]),{
    pane:'hexPane',
    color:'#003366',
    weight:0.4,
    fillColor:'#4a90e2',
    fillOpacity:0.6
  }).addTo(map);

  hexLayers.push(poly);
}

// ✅ POLYGON (NO buffer overshoot)
function handlePolygon(geo){

  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();

  const coords = geo.geometry.coordinates[0].map(c => [c[1],c[0]]);
  const hexes = h3.polyfill([coords],9);

  hexes.forEach(h => {

    const center = h3.h3ToGeo(h);
    const pt = turf.point([center[1], center[0]]);

    // ✅ ONLY keep hexes actually inside polygon
    if (turf.booleanPointInPolygon(pt, geo)) {
      selectedHexes.add(h);
      drawHex(h);
    }

  });

  updateUI();
}

// ✅ LINE (STABLE + CORRECT)
function handleLine(line){

  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();

  const bufferVal = parseFloat(buffer.value);

  const buffered = turf.buffer(line, bufferVal, {units:'meters'});

  bufferGroup.clearLayers();

  L.geoJSON(buffered,{
    style:{color:'#d12b2b',weight:2,fillOpacity:0.2}
  }).addTo(bufferGroup);

  // ✅ handle BOTH Polygon + MultiPolygon
  let polygons = [];

  if (buffered.geometry.type === "Polygon") {
    polygons = [buffered.geometry.coordinates];
  }

  if (buffered.geometry.type === "MultiPolygon") {
    polygons = buffered.geometry.coordinates;
  }

  polygons.forEach(polygon => {

    const coords = polygon[0].map(c => [c[1],c[0]]);
    const hexes = h3.polyfill([coords],9);

    hexes.forEach(h => {

      const center = h3.h3ToGeo(h);
      const pt = turf.point([center[1], center[0]]);

      if (turf.booleanPointInPolygon(pt, buffered)) {
        selectedHexes.add(h);
        drawHex(h);
      }

    });

  });

  updateUI();
}

// ✅ DRAW EVENT (CRITICAL FIX HERE)
map.on('draw:created', function(e){

  const layer = e.layer;

  drawnItems.clearLayers();
  bufferGroup.clearLayers();

  drawnItems.addLayer(layer);

  if(e.layerType === "polygon"){
    handlePolygon(layer.toGeoJSON());
  }

  if(e.layerType === "polyline"){

    const pts = layer.getLatLngs();

    // ✅ FIX: ignore incomplete lines (prevents 2-click close bug)
    
      // keep drawing active (do NOT process yet)
      return;
    }

    handleLine(layer.toGeoJSON());
  }

});

// ✅ SEARCH
window.searchLocation = function(){
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${searchBox.value}`)
    .then(r=>r.json())
    .then(d=>{
      if(!d.length) return;
      map.setView([d[0].lat,d[0].lon],15);
    });
}

});
</script>

</body>
</html>
