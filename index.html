<!DOCTYPE html>
<html>
<head>
  <title>Large Site Hex Selection</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
  <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf"></script>

  <!-- H3 -->
  <script src="https://unpkg.com/h3-js"></script>

  <style>
    body { margin:0; font-family: Arial; }

    #panel {
      width: 25%;
      float:left;
      padding: 20px;
      box-sizing: border-box;
      background:#f4f4f4;
      height:100vh;
    }

    #map {
      width: 75%;
      height:100vh;
      float:right;
    }

    input, select {
      width:100%;
      padding:8px;
      margin-bottom:10px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    /* ✅ Greyscale map */
    .leaflet-tile {
      filter: grayscale(100%) brightness(90%);
    }

    .hint {
      font-size:12px;
      color:#555;
      margin-bottom:10px;
    }

  </style>
</head>

<body>

<div id="panel">

  <h2>Search</h2>

  <input placeholder="Address / What3Words"/>

  <label>Buffer (line only)</label>
  <select id="buffer">
    <option value="25">25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <p class="hint">
    Draw a polygon or line. Double-click to finish drawing.
  </p>

  <h3>Details</h3>
  <select>
    <option>Info Only</option>
    <option>Planned</option>
    <option>Emergency</option>
  </select>

  <input placeholder="Type of works"/>
  <input placeholder="Planned date"/>
  <input placeholder="Contact details"/>

  <h3>Result</h3>
  <p>Tiles: <span id="tileCount">0</span></p>
  <p>Quote: £<span id="quote">0</span></p>

  <button onclick="clearAll()">Clear Selection</button>
  <button>Add to Basket</button>

</div>

<div id="map"></div>

<script>

// ✅ Map init
let map = L.map('map').setView([52.48, -1.89], 14);

// Disable double-click zoom so it finishes drawing cleanly
map.doubleClickZoom.disable();

// ✅ Greyscale basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// Layers
let drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// Draw controls
let drawControl = new L.Control.Draw({
  draw: {
    polygon: true,
    polyline: true,
    rectangle: false,
    circle: false,
    marker: false
  },
  edit: {
    featureGroup: drawnItems
  }
});
map.addControl(drawControl);

// Storage
let selectedHexes = new Set();
let hexLayers = [];

// ✅ Pricing
function calculatePrice(count){
  let price = 2.99;
  if(count > 50) price = 2.5;
  if(count > 100) price = 2.0;
  return (count * price).toFixed(0);
}

// ✅ Update UI
function updateUI(){
  document.getElementById("tileCount").innerText = selectedHexes.size;
  document.getElementById("quote").innerText = calculatePrice(selectedHexes.size);
}

// ✅ Draw hex
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, true);

  return L.polygon(boundary.map(([lat, lng]) => [lat, lng]), {
    color:"#1f4e79",
    weight:1,
    fillColor:"#4a90e2",
    fillOpacity:0.5
  }).addTo(map);
}

// ✅ Clear hex layer
function clearHexes(){
  hexLayers.forEach(layer => map.removeLayer(layer));
  hexLayers = [];
  selectedHexes.clear();
}

// ✅ Clear all
function clearAll(){
  drawnItems.clearLayers();
  clearHexes();
  updateUI();
}

// ✅ Core processing
function processGeometry(geojson){

  clearHexes();

  const resolution = 9;

  const hexes = h3.polyfill(geojson.geometry.coordinates, resolution);

  hexes.forEach(hex => {
    selectedHexes.add(hex);
    hexLayers.push(drawHex(hex));
  });

  updateUI();
}

// ✅ Handle draw events
map.on(L.Draw.Event.CREATED, function (e) {

  drawnItems.clearLayers();

  let layer = e.layer;
  drawnItems.addLayer(layer);

  let geojson;

  if (e.layerType === "polygon") {
    geojson = layer.toGeoJSON();
  }

  if (e.layerType === "polyline") {
    const line = layer.toGeoJSON();

    const bufferDistance = parseFloat(document.getElementById("buffer").value);

    // ✅ Show drawn line
    layer.setStyle({ color: "red", weight: 3 });

    geojson = turf.buffer(line, bufferDistance, { units: 'meters' });

    // ✅ Optional: show buffer area lightly
    L.geoJSON(geojson, {
      style: {
        color: "#ff6666",
        fillOpacity: 0.2
      }
    }).addTo(map);
  }

  processGeometry(geojson);
});

</script>

</body>
</html>
