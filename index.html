<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hex Site Selection</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

  <style>
    body { margin:0; font-family: Arial; }

    #map { height:100vh; width:100%; }

    #panel {
      position:absolute;
      top:20px;
      right:20px;
      width:300px;
      padding:20px;
      background:white;
      z-index:9999;
      border-radius:8px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>

  <!-- ✅ ✅ CRITICAL: LOAD LIBRARIES WITH DEFER -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js" defer></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js" defer></script>
  <script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js" defer></script>
</head>

<body>

<div id="panel">
  <h3>Search</h3>

  <select id="buffer">
    <option value="25">25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <p>Tiles: <span id="tileCount">0</span></p>
  <p>Quote: £<span id="quote">0</span></p>

  <button id="clearBtn">Clear Selection</button>
</div>

<div id="map"></div>

<!-- ✅ ✅ YOUR SCRIPT (NOW GUARANTEED TO RUN AFTER LIBRARIES) -->
<script defer>
document.addEventListener("DOMContentLoaded", function(){

  console.log("✅ Script running");

  
// ✅ Map (NOW WILL WORK)
const map = L.map('map').setView([52.48, -1.89], 13);

// ✅ 🔥 FIX: Improve drawing behaviour
map.doubleClickZoom.disable();

map.on('draw:drawstart', function() {
  map.doubleClickZoom.disable();
});

map.on('draw:drawstop', function() {
  map.doubleClickZoom.enable();
});

  const drawnItems = new L.FeatureGroup().addTo(map);
  const hexGroup = L.layerGroup().addTo(map);
  const bufferGroup = L.layerGroup().addTo(map);

  const drawControl = new L.Control.Draw({
    draw: {
      polygon:true,
      polyline:true,
      rectangle:false,
      circle:false,
      marker:false
    },
    edit:{ featureGroup: drawnItems }
  });

  map.addControl(drawControl);

  let selectedHexes = new Set();

  function updateUI(){
    document.getElementById("tileCount").innerText = selectedHexes.size;
    document.getElementById("quote").innerText = (selectedHexes.size * 2.99).toFixed(0);
  }

  function clearAll(){
    console.log("✅ CLEAR CLICKED");
    drawnItems.clearLayers();
    hexGroup.clearLayers();
    bufferGroup.clearLayers();
    selectedHexes.clear();
    updateUI();
  }

  document.getElementById("clearBtn")
    .addEventListener("click", clearAll);

  console.log("✅ Button wired");

  function drawHex(hex){
    const boundary = h3.h3ToGeoBoundary(hex, false);

    
L.polygon(boundary.map(p=>[p[0],p[1]]), {
  color:"#003366",
  weight:1,
  fillColor:"#4a90e2",
  fillOpacity:0.6   // 🔥 stronger
}).addTo(hexGroup);
  }

  function processGeometry(geojson){
    hexGroup.clearLayers();
    selectedHexes.clear();

    const hexes = h3.polyfill(geojson.geometry.coordinates, 9);

    hexes.forEach(h=>{
      selectedHexes.add(h);
      drawHex(h);
    });

    updateUI();
  }

  map.on('draw:created', function(e){

    drawnItems.clearLayers();
    hexGroup.clearLayers();
    bufferGroup.clearLayers();

    const layer = e.layer;
    
/ ✅ Apply style to drawn polygon
layer.setStyle({
  color: "#000000",
  weight: 2,
  fillOpacity: 0.1
});

drawnItems.addLayer(layer);

    let geojson;

    if (e.layerType === "polygon") {
      geojson = layer.toGeoJSON();
    }

    if (e.layerType === "polyline") {
      const line = layer.toGeoJSON();
      geojson = turf.buffer(line, 50, { units:'meters' });

      L.geoJSON(geojson, {
        style:{ color:"red", weight: 2, fillOpacity:0.1 }
      }).addTo(bufferGroup);
    }

    processGeometry(geojson);
  });

});
</script>

</body>
</html>
