<!DOCTYPE html>
<html>
<head>
  <title>Hex Site Selection</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leafletnpkg.com/leaflet/dist/leaft>

  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
  <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <!-- H3 -->
  <script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>

  <style>
    body { margin:0; font-family: Arial; }

    #panel {
      width:25%;
      float:left;
      padding:20px;
      background:#f4f4f4;
      height:100vh;
    }

    #map {
      width:75%;
      height:100vh;
      float:right;
    }

    input, select {
      width:100%;
      padding:8px;
      margin-bottom:10px;
    }

    button {
      width:100%;
      padding:12px;
      background:black;
      color:white;
      border:none;
      margin-top:10px;
    }

    /* greyscale */
    .leaflet-tile {
      filter: grayscale(100%) brightness(90%);
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Search</h2>

  <input placeholder="Address / What3Words"/>

  <label>Buffer (line only)</label>
  <select id="buffer">
    <option value="25">25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <p style="font-size:12px;">
    Draw polygon (click first point to close) or line (double-click to finish)
  </p>

  <h3>Result</h3>
  <p>Tiles: <span id="tileCount">0</span></p>
  <p>Quote: £<span id="quote">0</span></p>

  <button onclick="clearAll()">Clear Selection</button>
</div>

<div id="map"></div>

<script>

let map = L.map('map').setView([52.48, -1.89], 14);
map.doubleClickZoom.disable();

// base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// layers
let drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// draw control
let drawControl = new L.Control.Draw({
  draw: {
    polygon: true,
    polyline: true,
    rectangle: false,
    circle: false,
    marker: false
  },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

// storage
let selectedHexes = new Set();
let hexLayers = [];

// pricing
function calculatePrice(count){
  let price = 2.99;
  if(count > 50) price = 2.5;
  if(count > 100) price = 2.0;
  return (count * price).toFixed(0);
}

function updateUI(){
  document.getElementById("tileCount").innerText = selectedHexes.size;
  document.getElementById("quote").innerText = calculatePrice(selectedHexes.size);
}

function clearHexes(){
  hexLayers.forEach(h => map.removeLayer(h));
  hexLayers = [];
  selectedHexes.clear();
}

function clearAll(){
  drawnItems.clearLayers();
  clearHexes();
  updateUI();
}

// draw hex
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, true);
  return L.polygon(boundary.map(p => [p[0], p[1]]), {
    color:"#1f4e79",
    weight:1,
    fillColor:"#4a90e2",
    fillOpacity:0.5
  }).addTo(map);
}

// process geometry
function processGeometry(geojson){

  clearHexes();

  const coords = geojson.geometry.coordinates;
  const resolution = 9;

  const hexes = h3.polyfill(coords, resolution);

  hexes.forEach(h=>{
    selectedHexes.add(h);
    hexLayers.push(drawHex(h));
  });

  updateUI();
}

// handle draw
map.on(L.Draw.Event.CREATED, function(e){

  drawnItems.clearLayers();
  clearHexes();

  let layer = e.layer;
  drawnItems.addLayer(layer);

  let geojson;

  if (e.layerType === "polygon") {
    geojson = layer.toGeoJSON();
  }

  if (e.layerType === "polyline") {
    let line = layer.toGeoJSON();
    let buffer = parseFloat(document.getElementById("buffer").value);

    geojson = turf.buffer(line, buffer, {units:'meters'});

    // show buffer
    L.geoJSON(geojson, {
      style:{ color:"#ff6666", fillOpacity:0.2 }
    }).addTo(map);
  }

  processGeometry(geojson);

  // ✅ THIS FIXES YOUR PROBLEM
  drawControl._toolbars.draw.disable();
});

</script>

</body>
</html>
