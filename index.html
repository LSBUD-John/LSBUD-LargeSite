<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Hex Site Selection</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; width:100%; }

#panel {
  position:absolute;
  top:20px;
  right:20px;
  width:280px;
  padding:16px;
  background:white;
  z-index:9999;
  border-radius:8px;
  box-shadow:0 0 12px rgba(0,0,0,0.2);
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:10px;
  background:#0078d4;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:4px;
}

.leaflet-tile-pane {
  filter: grayscale(85%) brightness(96%);
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>
</head>

<body>

<div id="panel">

<h3>Search</h3>
<input id="searchBox" placeholder="Search address">
<button onclick="searchLocation()">Find</button>

<label>Buffer (line only)</label>
<select id="buffer">
<option value="25">25m</option>
<option value="50">50m</option>
<option value="75">75m</option>
<option value="100">100m</option>
</select>

<p>Tiles: <span id="tileCount">0</span></p>
<p>Quote: £<span id="quote">0</span></p>

<button id="clearBtn">Clear Selection</button>

</div>

<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ✅ MAP
const map = L.map('map').setView([52.48, -1.89], 13);

// ✅ IMPORTANT FIX: stop zoom interfering with draw finish
map.doubleClickZoom.disable();

// ✅ HEX PANE
map.createPane('hexPane');
map.getPane('hexPane').style.zIndex = 650;

// ✅ BASEMAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors | LSBUD'
}).addTo(map);

// ✅ LAYERS
const drawnItems = new L.FeatureGroup().addTo(map);
const bufferGroup = L.layerGroup().addTo(map);

// ✅ DRAW
const drawControl = new L.Control.Draw({
  draw: {
    polygon: true,
    polyline: {
      shapeOptions: { color: '#d12b2b', weight: 3 }
    },
    rectangle:false,
    circle:false,
    marker:false
  },
  edit:false
});
map.addControl(drawControl);

// ✅ DATA
let selectedHexes = new Set();
let hexLayers = [];

// ✅ PRICING
function calculatePrice(count){
  if (count <= 50) return (count*2.99).toFixed(0);
  if (count <= 100) return (count*2.5).toFixed(0);
  if (count <= 200) return (count*1.5).toFixed(0);
  if (count <= 500) return (count*0.99).toFixed(0);
  return (count*0.49).toFixed(0);
}

function updateUI(){
  tileCount.innerText = selectedHexes.size;
  quote.innerText = calculatePrice(selectedHexes.size);
}

// ✅ CLEAR
clearBtn.onclick = function(){
  drawnItems.clearLayers();
  bufferGroup.clearLayers();
  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();
  updateUI();
}

// ✅ SEARCH
window.searchLocation = function(){
  const query = searchBox.value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
    .then(res => res.json())
    .then(data => {
      if (!data.length) return;
      map.setView([data[0].lat, data[0].lon], 15);
      L.marker([data[0].lat, data[0].lon]).addTo(map);
    });
}

// ✅ DRAW HEX
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, false);

  const hexLayer = L.polygon(boundary.map(p => [p[0], p[1]]), {
    pane: 'hexPane',
    color:"#003366",
    weight:0.4,
    fillColor:"#4a90e2",
    fillOpacity:0.6
  }).addTo(map);

  hexLayers.push(hexLayer);
}

// ✅ POLYGON
function processPolygon(geo){

  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();

  const expanded = turf.buffer(geo, 175, { units:'meters' });

  const coords = expanded.geometry.coordinates[0].map(c=>[c[1],c[0]]);
  const hexes = h3.polyfill([coords], 9);

  hexes.forEach(h=>{
    selectedHexes.add(h);
    drawHex(h);
  });

  updateUI();
}

// ✅ LINE (FINAL CORRECT VERSION)
function processLine(line){
 
  const bufferValue = parseFloat(buffer.value);

  // ✅ draw visual buffer
  const buffered = turf.buffer(line, bufferValue, { units:'meters' });

  bufferGroup.clearLayers();

  L.geoJSON(buffered, {
    style:{ color:"#d12b2b", weight:2, fillOpacity:0.25 }
  }).addTo(bufferGroup);

  // ✅ reset
  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();

  const length = turf.length(line, {units:'kilometers'});

  // ✅ dense sampling = smoother corridor
  const step = 0.02;

  let rawHexes = new Set();

  // ✅ STEP 1: sample line
  for (let d = 0; d <= length; d += step){
    const pt = turf.along(line, d, {units:'kilometers'});
    const [lng, lat] = pt.geometry.coordinates;
    rawHexes.add(h3.geoToH3(lat, lng, 9));
  }

  // ✅ STEP 2: filter by distance (TRUE buffer match)
  let filteredHexes = new Set();

  rawHexes.forEach(h => {
    const center = h3.h3ToGeo(h);
    const pt = turf.point([center[1], center[0]]);
    const dist = turf.pointToLineDistance(pt, line, {units:'meters'});

    if (dist <= bufferValue){
      filteredHexes.add(h);
    }
  });

  // ✅ STEP 3: minimal expansion to fill gaps (controlled)
  let finalHexes = new Set([...filteredHexes]);

  filteredHexes.forEach(h => {
    h3.kRing(h, 1).forEach(n => {
      const center = h3.h3ToGeo(n);
      const pt = turf.point([center[1], center[0]]);
      const dist = turf.pointToLineDistance(pt, line, {units:'meters'});

      if (dist <= bufferValue){
        finalHexes.add(n);
      }
    });
  });

  // ✅ DRAW
  finalHexes.forEach(h => drawHex(h));

  selectedHexes = finalHexes;
  
  updateUI();
}

// ✅ DRAW EVENT
map.on('draw:created', function(e){

  drawnItems.clearLayers();
  bufferGroup.clearLayers();

  const layer = e.layer;

  layer.setStyle({
    color:"#d12b2b",
    weight:3,
    fillOpacity:0.05
  });

  drawnItems.addLayer(layer);

  if (e.layerType === "polygon"){
    processPolygon(layer.toGeoJSON());
  }

  if (e.layerType === "polyline"){
      
const latlngs = layer.getLatLngs();

  // ✅ REQUIRE at least 3 points (2 segments)
  if (latlngs.length < 3) {
    return;
  }

  processLine(layer.toGeoJSON());
 }
});

});
</script>

</body>
</html>
``
