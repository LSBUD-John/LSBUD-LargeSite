<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Hex Site Selection</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

<style>
body { margin:0; font-family: Arial; }

#map { height:100vh; width:100%; }

#panel {
  position:absolute;
  top:20px;
  right:20px;
  width:280px;
  padding:16px;
  background:white;
  z-index:9999;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* cleaner layout */
input, select {
  width:100%;
  padding:8px;
  margin:8px 0;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  cursor:pointer;
  background:#0078d4;
  color:white;
  font-weight:600;
}

/* space between groups */
.section {
  margin-bottom:12px;
}

/* greyscale */
.leaflet-tile-pane {
  filter: grayscale(100%) brightness(90%);
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js" defer></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js" defer></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js" defer></script>
</head>

<body>

<div id="panel">
<h3>Search</h3>

<div class="section">
<input id="searchBox" placeholder="Enter address">
<button onclick="searchLocation()">Find</button>
</div>

<div class="section">
<label>Buffer (line only)</label>
<select id="buffer">
<option value="25">25m</option>
<option value="50">50m</option>
<option value="75">75m</option>
<option value="100">100m</option>
</select>
</div>

<p>Tiles: <span id="tileCount">0</span></p>
<p>Quote: £<span id="quote">0</span></p>

<button id="clearBtn">Clear Selection</button>
</div>

<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ✅ MAP
const map = L.map('map').setView([52.48, -1.89], 13);

// ✅ BASEMAP + COPYRIGHT
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors | LSBUD'
}).addTo(map);

// ✅ PANEL INTERACTION
const panel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(panel);
L.DomEvent.disableScrollPropagation(panel);

// ✅ LAYERS
const drawnItems = new L.FeatureGroup().addTo(map);
const hexGroup = L.layerGroup().addTo(map);
const bufferGroup = L.layerGroup().addTo(map);

// ✅ DRAW TOOLS (removed edit/delete)
const drawControl = new L.Control.Draw({
  draw: {
    polygon:true,
    polyline:true,
    rectangle:false,
    circle:false,
    marker:false
  },
  edit:false
});
map.addControl(drawControl);

// ✅ DATA
let selectedHexes = new Set();

// ✅ PRICING
function calculatePrice(count){
  if (count <= 50) return (count * 2.99).toFixed(0);
  if (count <= 100) return (count * 2.5).toFixed(0);
  if (count <= 200) return (count * 1.5).toFixed(0);
  if (count <= 500) return (count * 0.99).toFixed(0);
  return (count * 0.49).toFixed(0);
}

// ✅ UI
function updateUI(){
  const count = selectedHexes.size;
  tileCount.innerText = count;
  quote.innerText = calculatePrice(count);
}

// ✅ CLEAR
function clearAll(){
  drawnItems.clearLayers();
  hexGroup.clearLayers();
  bufferGroup.clearLayers();
  selectedHexes.clear();
  updateUI();
}
clearBtn.onclick = clearAll;

// ✅ SEARCH
window.searchLocation = function(){
  const query = searchBox.value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
    .then(r => r.json())
    .then(data => {
      if(!data.length) return;
      map.setView([data[0].lat, data[0].lon], 15);
      L.marker([data[0].lat, data[0].lon]).addTo(map);
    });
}

// ✅ HEX DRAW (NO bringToFront AT ALL)
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, false);

  L.polygon(boundary.map(p => [p[0], p[1]]), {
    color:"#003366",
    weight:0.8,
    fillColor:"#4a90e2",
    fillOpacity:0.55
  }).addTo(map); // 🔥 draw directly on map = always on top
}

// ✅ PROCESS
function processGeometry(geojson){

  hexGroup.clearLayers();
  selectedHexes.clear();

  const hexes = h3.polyfill(geojson.geometry.coordinates, 9);

  hexes.forEach(h => {
    selectedHexes.add(h);
    drawHex(h);
  });

  updateUI();
}

// ✅ DRAW EVENT
map.on('draw:created', function(e){

  drawnItems.clearLayers();
  hexGroup.clearLayers();
  bufferGroup.clearLayers();

  const layer = e.layer;

  layer.setStyle({
    color:"#000",
    weight:2,
    fillOpacity:0.1
  });

  drawnItems.addLayer(layer);

  let geo;

  if(e.layerType === "polygon"){
    geo = layer.toGeoJSON();
  }

  if(e.layerType === "polyline"){
    const buffer = parseFloat(buffer.value);

    geo = turf.buffer(layer.toGeoJSON(), buffer, { units:'meters' });

    L.geoJSON(geo, {
      style:{ color:"red", weight:2, fillOpacity:0.1 }
    }).addTo(bufferGroup);
  }

  if(geo) processGeometry(geo);
});

});
</script>

</body>
</html>
