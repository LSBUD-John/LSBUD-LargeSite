<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hex Site Selection</title>

  <!-- ✅ Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

  <style>
    body { margin:0; font-family: Arial; }

    #map {
      height:100vh;
      width:100%;
    }

    #panel {
      position:absolute;
      top:20px;
      left:20px;
      width:300px;
      padding:20px;
      background:rgba(255,255,255,0.95);
      z-index:10000;
      border-radius:8px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    button {
      width:100%;
      padding:12px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
      margin-top:10px;
    }

    .leaflet-tile {
      filter: grayscale(100%) brightness(90%);
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Search</h2>

  <label>Buffer</label>
  <select id="buffer">
    <option value="25">25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <h3>Result</h3>
  <p>Tiles: <span id="tileCount">0</span></p>
  <p>Quote: £<span id="quote">0</span></p>

  <button id="clearBtn">Clear Selection</button>
</div>

<div id="map"></div>

<!-- ✅ Scripts (CORRECT + COMPLETE) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>

<script>

// ✅ Wait for DOM (important)
document.addEventListener("DOMContentLoaded", function(){

  console.log("✅ Script running");

  // ✅ Map
  const map = L.map('map', {
    doubleClickZoom:false
  }).setView([52.48, -1.89], 13);

  // ✅ Tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19
  }).addTo(map);

  // ✅ Prevent map eating panel clicks
  const panel = document.getElementById("panel");
  L.DomEvent.disableClickPropagation(panel);
  L.DomEvent.disableScrollPropagation(panel);

  // ✅ Layers
  const drawnItems = new L.FeatureGroup().addTo(map);
  const hexGroup = L.layerGroup().addTo(map);
  const bufferGroup = L.layerGroup().addTo(map);

  // ✅ Draw tools
  const drawControl = new L.Control.Draw({
    draw: {
      polygon:true,
      polyline:true,
      rectangle:false,
      circle:false,
      marker:false
    },
    edit:{ featureGroup: drawnItems }
  });

  map.addControl(drawControl);

  // ✅ Data
  let selectedHexes = new Set();

  function updateUI(){
    document.getElementById("tileCount").innerText = selectedHexes.size;
    document.getElementById("quote").innerText = (selectedHexes.size * 2.99).toFixed(0);
  }

  // ✅ CLEAR (finally bulletproof)
  function clearAll(){
    console.log("✅ CLEAR CLICKED");

    drawnItems.clearLayers();
    hexGroup.clearLayers();
    bufferGroup.clearLayers();
    selectedHexes.clear();

    drawControl._toolbars.draw.disable();

    updateUI();
  }

  // ✅ Bind button (reliable)
  document.getElementById("clearBtn")
    .addEventListener("click", function(e){
      e.stopPropagation();
      clearAll();
    });

  console.log("✅ Button wired");

  // ✅ Draw hex
  function drawHex(hex){
    const boundary = h3.h3ToGeoBoundary(hex, false);

    L.polygon(boundary.map(p => [p[0], p[1]]), {
      color:"#1f4e79",
      weight:0.5,
      fillColor:"#4a90e2",
      fillOpacity:0.35
    }).addTo(hexGroup);
  }

  // ✅ Process geometry
  function processGeometry(geojson){
    hexGroup.clearLayers();
    selectedHexes.clear();

    const hexes = h3.polyfill(geojson.geometry.coordinates, 9);

    hexes.forEach(h=>{
      selectedHexes.add(h);
      drawHex(h);
    });

    updateUI();
  }

  // ✅ Drawing event
  map.on('draw:created', function(e){

    drawnItems.clearLayers();
    hexGroup.clearLayers();
    bufferGroup.clearLayers();

    const layer = e.layer;
    drawnItems.addLayer(layer);

    let geojson;

    if (e.layerType === "polygon") {
      geojson = layer.toGeoJSON();
    }

    if (e.layerType === "polyline") {
      const line = layer.toGeoJSON();
      const buffer = parseFloat(document.getElementById("buffer").value);

      geojson = turf.buffer(line, buffer, { units:'meters' });

      L.geoJSON(geojson, {
        style: { color:"red", fillOpacity:0.2 }
      }).addTo(bufferGroup);
    }

    processGeometry(geojson);

    drawControl._toolbars.draw.disable();
  });

});
</script>

</body>
</html>
``
