<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hex Site Selection</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

  <style>
    body { margin:0; font-family: Arial; }

    #map {
      height:100vh;
      width:100%;
    }

    #panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 300px;
      padding: 20px;
      background: rgba(255,255,255,0.95);
      z-index: 10000;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      border-radius: 8px;
    }

    .leaflet-tile {
      filter: grayscale(100%) brightness(90%);
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Search</h2>

  <label>Buffer (line only)</label>
  <select id="buffer">
    <option value="25">25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <h3>Result</h3>
  <p>Tiles: <span id="tileCount">0</span></p>
  <p>Quote: £<span id="quote">0</span></p>

  <button id="clearBtn">Clear Selection</button>
</div>

<div id="map"></div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>

<script>

// ✅ Map init
const map = L.map('map').setView([52.48, -1.89], 13);
map.doubleClickZoom.disable();

// ✅ Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ✅ Layer groups (CRITICAL for proper clearing)
const drawnItems = new L.FeatureGroup().addTo(map);
const hexGroup = L.layerGroup().addTo(map);
const bufferGroup = L.layerGroup().addTo(map);

// ✅ Draw controls
const drawControl = new L.Control.Draw({
  draw: {
    polygon: true,
    polyline: true,
    rectangle: false,
    circle: false,
    marker: false
  },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

// ✅ Data
let selectedHexes = new Set();

// ✅ UI
function calculatePrice(count){
  return (count * 2.99).toFixed(0);
}

function updateUI(){
  document.getElementById("tileCount").innerText = selectedHexes.size;
  document.getElementById("quote").innerText = calculatePrice(selectedHexes.size);
}

// ✅ CLEAR FUNCTION (fully working)
function clearAll(){
  console.log("✅ CLEAR CLICKED");

  drawnItems.clearLayers();
  hexGroup.clearLayers();
  bufferGroup.clearLayers();
  selectedHexes.clear();

  // reset draw mode cleanly
  drawControl._toolbars.draw.disable();

  updateUI();
}

// ✅ Draw hex (refined visuals)
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, false);

  return L.polygon(boundary.map(p => [p[0], p[1]]), {
    color:"#1f4e79",
    weight:0.5,
    fillColor:"#4a90e2",
    fillOpacity:0.35,
    lineJoin:"round"
  }).addTo(hexGroup);
}

// ✅ Process geometry
function processGeometry(geojson){

  hexGroup.clearLayers();
  selectedHexes.clear();

  const hexes = h3.polyfill(geojson.geometry.coordinates, 9);

  hexes.forEach(h=>{
    selectedHexes.add(h);
    drawHex(h);
  });

  updateUI();
}

// ✅ Draw handler
map.on('draw:created', function(e){

  drawnItems.clearLayers();
  hexGroup.clearLayers();
  bufferGroup.clearLayers();

  const layer = e.layer;
  drawnItems.addLayer(layer);

  let geojson;

  if (e.layerType === "polygon") {
    geojson = layer.toGeoJSON();
  }

  if (e.layerType === "polyline") {
    const line = layer.toGeoJSON();
    const buffer = parseFloat(document.getElementById("buffer").value);

    geojson = turf.buffer(line, buffer, { units: 'meters' });

    L.geoJSON(geojson, {
      style: {
        color: "red",
        fillOpacity: 0.15,
        weight: 2
      }
    }).addTo(bufferGroup);
  }

  processGeometry(geojson);

  drawControl._toolbars.draw.disable();
});

// ✅ SAFE BUTTON BINDING (this was your blocker)
document.addEventListener("DOMContentLoaded", function(){

  const btn = document.getElementById("clearBtn");

  if (btn) {
    btn.addEventListener("click", clearAll);
    console.log("✅ Button wired correctly");
  } else {
    console.log("❌ Button NOT found");
  }

});

</script>

</body>
</html>
