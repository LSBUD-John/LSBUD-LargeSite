<script>

// ✅ Wait until DOM is fully ready
document.addEventListener("DOMContentLoaded", function(){

  // ✅ Map init
  const map = L.map('map', {
    doubleClickZoom: false,
    attributionControl: true,
    zoomControl: true
  }).setView([52.48, -1.89], 13);

  // ✅ Basemap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // ✅ Panel click isolation (NOW SAFE)
  const panel = document.getElementById('panel');
  L.DomEvent.disableClickPropagation(panel);
  L.DomEvent.disableScrollPropagation(panel);

  // ✅ Layers
  const drawnItems = new L.FeatureGroup().addTo(map);
  const hexGroup = L.layerGroup().addTo(map);
  const bufferGroup = L.layerGroup().addTo(map);

  // ✅ Drawing controls
  const drawControl = new L.Control.Draw({
    draw: {
      polygon: true,
      polyline: true,
      rectangle: false,
      circle: false,
      marker: false
    },
    edit: { featureGroup: drawnItems }
  });
  map.addControl(drawControl);

  // ✅ Data
  let selectedHexes = new Set();

  // ✅ UI
  function calculatePrice(count){
    return (count * 2.99).toFixed(0);
  }

  function updateUI(){
    document.getElementById("tileCount").innerText = selectedHexes.size;
    document.getElementById("quote").innerText = calculatePrice(selectedHexes.size);
  }

  // ✅ CLEAR (now guaranteed working)
  function clearAll(){
    console.log("✅ CLEAR CLICKED");

    drawnItems.clearLayers();
    hexGroup.clearLayers();
    bufferGroup.clearLayers();
    selectedHexes.clear();

    drawControl._toolbars.draw.disable();

    updateUI();
  }

  // ✅ Bind button SAFELY
  const clearBtn = document.getElementById("clearBtn");
  clearBtn.addEventListener("click", function(e){
    e.stopPropagation();
    clearAll();
  });

  console.log("✅ Button wired");

  // ✅ Draw hex
  function drawHex(hex){
    const boundary = h3.h3ToGeoBoundary(hex, false);

    L.polygon(boundary.map(p => [p[0], p[1]]), {
      color:"#1f4e79",
      weight:0.5,
      fillColor:"#4a90e2",
      fillOpacity:0.35
    }).addTo(hexGroup);
  }

  // ✅ Process geometry
  function processGeometry(geojson){

    hexGroup.clearLayers();
    selectedHexes.clear();

    const hexes = h3.polyfill(geojson.geometry.coordinates, 9);

    hexes.forEach(h=>{
      selectedHexes.add(h);
      drawHex(h);
    });

    updateUI();
  }

  // ✅ Draw handler
  map.on('draw:created', function(e){

    drawnItems.clearLayers();
    bufferGroup.clearLayers();
    hexGroup.clearLayers();

    const layer = e.layer;
    drawnItems.addLayer(layer);

    let geojson;

    if (e.layerType === "polygon") {
      geojson = layer.toGeoJSON();
    }

    if (e.layerType === "polyline") {
      const line = layer.toGeoJSON();
      const buffer = parseFloat(document.getElementById("buffer").value);

      geojson = turf.buffer(line, buffer, { units: 'meters' });

      L.geoJSON(geojson, {
        style: {
          color: "red",
          fillOpacity: 0.15,
          weight: 2
        }
      }).addTo(bufferGroup);
    }

    processGeometry(geojson);

    drawControl._toolbars.draw.disable();
  });

});
</script>
