<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Hex Site Selection</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; width:100%; }

#panel {
  position:absolute;
  top:20px;
  right:20px;
  width:280px;
  padding:16px;
  background:white;
  z-index:9999;
  border-radius:8px;
  box-shadow:0 0 12px rgba(0,0,0,0.2);
}

.section { margin-bottom:16px; }

input, select {
  width:100%;
  padding:8px;
  margin-top:6px;
  margin-bottom:10px;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  cursor:pointer;
  background:#0078d4;
  color:white;
  font-weight:600;
  border-radius:4px;
}

/* ✅ Lighter greyscale */
.leaflet-tile-pane {
  filter: grayscale(85%) brightness(96%);
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js" defer></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js" defer></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js" defer></script>
</head>

<body>

<div id="panel">

<h3>Search</h3>

<div class="section">
<input id="searchBox" placeholder="Search address">
<button onclick="searchLocation()">Find</button>
</div>

<div class="section" id="bufferSection">
<label>Buffer (line only)</label>
<select id="buffer">
<option value="25">25m</option>
<option value="50">50m</option>
<option value="75">75m</option>
<option value="100">100m</option>
</select>
</div>

<p>Tiles: <span id="tileCount">0</span></p>
<p>Quote: £<span id="quote">0</span></p>

<button id="clearBtn">Clear Selection</button>

</div>

<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ✅ MAP
const map = L.map('map').setView([52.48, -1.89], 13);

// ✅ CREATE HEX PANE (THIS FIXES EVERYTHING)
map.createPane('hexPane');
map.getPane('hexPane').style.zIndex = 650;

// ✅ BASEMAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors | LSBUD'
}).addTo(map);

// ✅ PANEL INTERACTION
const panel = document.getElementById("panel");
L.DomEvent.disableClickPropagation(panel);
L.DomEvent.disableScrollPropagation(panel);

// ✅ LAYERS
const drawnItems = new L.FeatureGroup().addTo(map);
const bufferGroup = L.layerGroup().addTo(map);

// ✅ DRAW TOOL
const drawControl = new L.Control.Draw({
  draw: {
    polygon:true,
    polyline:true,
    rectangle:false,
    circle:false,
    marker:false
  },
  edit:false
});
map.addControl(drawControl);

// ✅ DATA
let selectedHexes = new Set();
let hexLayers = [];

// ✅ PRICING
function calculatePrice(count){
  if (count <= 50) return (count*2.99).toFixed(0);
  if (count <= 100) return (count*2.5).toFixed(0);
  if (count <= 200) return (count*1.5).toFixed(0);
  if (count <= 500) return (count*0.99).toFixed(0);
  return (count*0.49).toFixed(0);
}

// ✅ UI
function updateUI(){
  tileCount.innerText = selectedHexes.size;
  quote.innerText = calculatePrice(selectedHexes.size);
}

// ✅ CLEAR
function clearAll(){
  drawnItems.clearLayers();
  bufferGroup.clearLayers();
  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();
  updateUI();
}
clearBtn.onclick = clearAll;

// ✅ SEARCH
window.searchLocation = function(){
  const query = searchBox.value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
    .then(res => res.json())
    .then(data => {
      if(!data.length) return;
      map.setView([data[0].lat, data[0].lon], 15);
      L.marker([data[0].lat, data[0].lon]).addTo(map);
    });
}

// ✅ DRAW HEX — ALWAYS ON TOP
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, false);

  const hexLayer = L.polygon(boundary.map(p => [p[0], p[1]]), {
    pane: 'hexPane',        // ✅ THIS IS THE KEY FIX
    color:"#002244",
    weight:1,
    fillColor:"#0078d4",
    fillOpacity:0.5
  }).addTo(map);

  hexLayers.push(hexLayer);
}

// ✅ PROCESS
function processGeometry(geo){

  // clear previous
  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();

  // ✅ FIX: convert lat/lng → lng/lat
  const coords = geo.geometry.coordinates[0].map(c => [c[1], c[0]]);

  const hexes = h3.polyfill([coords], 9);

  hexes.forEach(h => {
    selectedHexes.add(h);
    drawHex(h);
  });

  updateUI();
}

// ✅ BUFFER UI CONTROL
map.on('draw:drawstart', function(e){
  bufferSection.style.display = (e.layerType === "polyline") ? "block" : "none";
});

// ✅ DRAW COMPLETE
map.on('draw:created', function(e){

  drawnItems.clearLayers();
  bufferGroup.clearLayers();

  const layer = e.layer;

  // ✅ BLUE SITE AREA
  layer.setStyle({
    color: "#0078d4",
    weight: 2,
    fillColor:"#0078d4",
    fillOpacity: 0.12
  });

  drawnItems.addLayer(layer);

  let geo;

  if(e.layerType === "polygon"){
    geo = layer.toGeoJSON();
  }

  if(e.layerType === "polyline"){
   if(e.layerType === "polyline"){

  const bufferValue = parseFloat(document.getElementById("buffer").value);

  const buffered = turf.buffer(layer.toGeoJSON(), bufferValue, { units:'meters' });

  // ✅ Draw visible buffer
  L.geoJSON(buffered, {
    style: {
      color:"#0078d4",
      weight:2,
      fillOpacity:0.55
    }
  }).addTo(bufferGroup);

  // ✅ Handle both Polygon and MultiPolygon properly
  let coords;

  if (buffered.geometry.type === "Polygon") {
    coords = [buffered.geometry.coordinates];
  }

  if (buffered.geometry.type === "MultiPolygon") {
    coords = buffered.geometry.coordinates;
  }

  // ✅ Convert to lng/lat for H3
  const poly = coords.map(polygon =>
    polygon[0].map(c => [c[1], c[0]])
  );

  // ✅ Run H3
  const hexes = h3.polyfill(poly, 9);

  hexLayers.forEach(l => map.removeLayer(l));
  hexLayers = [];
  selectedHexes.clear();

  hexes.forEach(h => {
    selectedHexes.add(h);
    drawHex(h);
  });

  updateUI();
}

});
</script>

</body>
</html>
