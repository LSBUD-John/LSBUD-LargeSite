<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>LSBUD Large Site Hex Selection</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body { 
  margin:0; 
  font-family: Arial; 
}

#map { 
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:100vh;
}

#panel {
  position:absolute;
  top:20px;
  right:20px;
  width:330px;
  max-height:92vh;
  overflow-y:auto;
  padding:16px;
  background:white;
  z-index:9999;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h3 {
  margin-top:0;
}

input, select, textarea {
  width:100%;
  padding:8px;
  margin-bottom:10px;
  box-sizing:border-box;
}

textarea {
  min-height:70px;
}

button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:600;
}

button.secondary {
  background:#555;
}

button.danger {
  background:#d12b2b;
}

button.success {
  background:#107c10;
}

button.activeDraw {
  background:#004578;
  outline:3px solid #80c7ff;
}

.section {
  border-top:1px solid #ddd;
  padding-top:12px;
  margin-top:12px;
}

.small {
  font-size:12px;
  color:#555;
}

#modeStatus {
  font-size:13px;
  font-weight:600;
  color:#004578;
  margin:6px 0 12px 0;
}

#quoteStatus {
  font-size:13px;
  color:#107c10;
  font-weight:600;
}

#retrieveLinkInput {
  font-size:12px;
}

.hidden {
  display:none;
}

.leaflet-tile-pane {
  filter: grayscale(85%) brightness(96%);
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>
</head>

<body>

<div id="panel">

  <h3>Search</h3>

  <input id="searchBox" placeholder="Search address or Easting/Northing">
  <button id="findBtn">Find</button>

  <label>Buffer for line</label>
  <select id="buffer">
    <option value="25" selected>25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <button id="drawPolygonBtn">Draw Polygon</button>
  <button id="drawLineBtn">Draw Line</button>
  <button id="finishBtn" class="secondary">Finish Drawing</button>
  <button id="clearBtn" class="danger">Clear</button>

  <div id="modeStatus">No drawing mode selected</div>

  <div class="section">
    <p>Selected Area: <span id="selectedArea">0.000</span> sq km</p>
    <p>Tiles: <span id="tileCount">0</span></p>
    <p>Quote: £<span id="quoteAmount">0</span></p>
  </div>

  <div class="section">
    <h3>Quote</h3>

    <input id="quoteEmail" placeholder="Email address for saved quote">

    <button id="saveQuoteBtn">Save Quote</button>
    <button id="acceptQuoteBtn" class="success">Accept Quote</button>

    <p>Quote Ref: <strong><span id="quoteRefText">Not created</span></strong></p>
    <p id="quoteStatus"></p>

    <div id="retrieveLinkBox" class="hidden">
      <label>Retrieve quote link</label>
      <input id="retrieveLinkInput" readonly>
      <button id="copyRetrieveLinkBtn" class="secondary">Copy Retrieve Link</button>
    </div>

    <button id="downloadQuoteBtn" class="secondary">Download Quote JSON</button>
  </div>

  <div id="orderSection" class="section hidden">
    <h3>Search Details</h3>

    <label>Organisation</label>
    <input id="organisation" placeholder="Organisation name">

    <label>Contact name</label>
    <input id="contactName" placeholder="Contact name">

    <label>Contact email</label>
    <input id="contactEmail" placeholder="Contact email">

    <label>Contact phone</label>
    <input id="contactPhone" placeholder="Contact phone">

    <label>Project reference</label>
    <input id="projectRef" placeholder="Your project reference">

    <label>Category</label>
    <select id="category">
      <option value="Info Only">Info Only</option>
      <option value="Planned">Planned</option>
      <option value="Emergency">Emergency</option>
    </select>

    <label>Type of works</label>
    <select id="workType"></select>

    <label>Planned start date</label>
    <input id="plannedDate" type="date">

    <label>Reason / notes</label>
    <textarea id="notes" placeholder="Describe search reason, works method, duration, depths etc."></textarea>

    <label>Payment method</label>
    <select id="paymentMethod">
      <option value="Card">Card payment</option>
      <option value="BACS">BACS / Invoice</option>
    </select>

    <button id="createOrderBtn" class="success">Add to Basket / Create Order</button>
    <button id="downloadPayloadBtn" class="secondary">Download OneCall Payload</button>
  </div>

</div>

<div id="map"></div>

<script>
function initApp(){

  const H3_RESOLUTION = 9;
  const EDGE_CANDIDATE_BUFFER_METRES = 500;

  proj4.defs(
    "EPSG:27700",
    "+proj=tmerc +lat_0=49 +lon_0=-2 +k=0.9996012717 +x_0=400000 +y_0=-100000 +ellps=airy +datum=OSGB36 +units=m +no_defs"
  );

  const map = L.map('map').setView([52.48, -1.89], 13);
  map.doubleClickZoom.disable();

  map.createPane('hexPane');
  map.getPane('hexPane').style.zIndex = 650;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19,
    attribution:'&copy; OpenStreetMap contributors | LSBUD'
  }).addTo(map);

  const panel = document.getElementById("panel");
  L.DomEvent.disableClickPropagation(panel);
  L.DomEvent.disableScrollPropagation(panel);

  let drawMode = null;
  let currentPoints = [];
  let currentSketchLayer = null;

  let drawnLayer = null;
  let bufferLayer = null;
  let searchMarker = null;

  let hexLayers = [];
  let selectedHexes = new Set();

  let lastLineGeo = null;
  let selectedGeometry = null;
  let currentQuote = null;

  const tileCount = document.getElementById("tileCount");
  const quoteAmount = document.getElementById("quoteAmount");
  const selectedArea = document.getElementById("selectedArea");
  const bufferSelect = document.getElementById("buffer");

  const drawPolygonBtn = document.getElementById("drawPolygonBtn");
  const drawLineBtn = document.getElementById("drawLineBtn");
  const modeStatus = document.getElementById("modeStatus");

  const quoteRefText = document.getElementById("quoteRefText");
  const quoteStatus = document.getElementById("quoteStatus");
  const orderSection = document.getElementById("orderSection");
  const retrieveLinkBox = document.getElementById("retrieveLinkBox");
  const retrieveLinkInput = document.getElementById("retrieveLinkInput");

  const category = document.getElementById("category");
  const workType = document.getElementById("workType");

  const workTypeOptions = {
    "Info Only": [
      "Asset information review",
      "Feasibility study",
      "Site due diligence",
      "Other"
    ],
    "Planned": [
      "Housing development",
      "Commercial development",
      "Roadworks",
      "Utility works",
      "Drainage works",
      "Site investigation",
      "Demolition",
      "Landscaping",
      "Other"
    ],
    "Emergency": [
      "Emergency excavation",
      "Emergency repair",
      "Incident response",
      "Urgent utility works",
      "Other"
    ]
  };

  function populateWorkTypes(){
    const selectedCategory = category.value;
    workType.innerHTML = "";

    workTypeOptions[selectedCategory].forEach(optionText => {
      const option = document.createElement("option");
      option.value = optionText;
      option.textContent = optionText;
      workType.appendChild(option);
    });
  }

  category.onchange = populateWorkTypes;
  populateWorkTypes();

  function calculatePrice(count){
    if(count <= 50) return count * 2.99;
    if(count <= 100) return count * 2.50;
    if(count <= 200) return count * 1.50;
    if(count <= 500) return count * 0.99;
    return count * 0.49;
  }

  function getPriceBand(count){
    if(count <= 50) return "1-50";
    if(count <= 100) return "51-100";
    if(count <= 200) return "101-200";
    if(count <= 500) return "201-500";
    return "500+";
  }

  function getUnitPrice(count){
    if(count <= 50) return 2.99;
    if(count <= 100) return 2.50;
    if(count <= 200) return 1.50;
    if(count <= 500) return 0.99;
    return 0.49;
  }

  function updateModeUI(){
    drawPolygonBtn.classList.remove("activeDraw");
    drawLineBtn.classList.remove("activeDraw");

    if(drawMode === "polygon"){
      drawPolygonBtn.classList.add("activeDraw");
      modeStatus.style.display = "block";
      modeStatus.innerText = "Polygon mode active — click points, then Finish Drawing.";
      return;
    }

    if(drawMode === "line"){
      drawLineBtn.classList.add("activeDraw");
      modeStatus.style.display = "block";
      modeStatus.innerText = "Line mode active — click points, then Finish Drawing.";
      return;
    }

    if(selectedHexes.size > 0){
      modeStatus.innerText = "";
      modeStatus.style.display = "none";
      return;
    }

    modeStatus.style.display = "block";
    modeStatus.innerText = "No drawing mode selected";
  }

  function updateUI(){
    tileCount.innerText = selectedHexes.size;
    quoteAmount.innerText = Math.round(calculatePrice(selectedHexes.size));
    updateModeUI();
  }

  function updateSelectedArea(geo){
    const areaSqM = turf.area(geo);
    const areaSqKm = areaSqM / 1000000;
    selectedArea.innerText = areaSqKm.toFixed(3);
  }

  function resetSelectedArea(){
    selectedArea.innerText = "0.000";
  }

  function clearHexes(){
    hexLayers.forEach(layer => map.removeLayer(layer));
    hexLayers = [];
    selectedHexes.clear();
    updateUI();
  }

  function clearSketch(){
    if(currentSketchLayer){
      map.removeLayer(currentSketchLayer);
      currentSketchLayer = null;
    }

    currentPoints = [];
    drawMode = null;
    updateModeUI();
  }

  function clearAll(){
    clearSketch();

    if(drawnLayer){
      map.removeLayer(drawnLayer);
      drawnLayer = null;
    }

    if(bufferLayer){
      map.removeLayer(bufferLayer);
      bufferLayer = null;
    }

    lastLineGeo = null;
    selectedGeometry = null;
    currentQuote = null;

    quoteRefText.innerText = "Not created";
    quoteStatus.innerText = "";
    retrieveLinkInput.value = "";
    retrieveLinkBox.classList.add("hidden");
    orderSection.classList.add("hidden");

    clearHexes();
    resetSelectedArea();
    updateModeUI();
  }

  function drawHex(hex){
    const boundary = h3.h3ToGeoBoundary(hex, false);

    const layer = L.polygon(boundary.map(p => [p[0], p[1]]), {
      pane:'hexPane',
      color:'#003366',
      weight:0.45,
      fillColor:'#4a90e2',
      fillOpacity:0.58
    }).addTo(map);

    hexLayers.push(layer);
  }

  function hexToTurfPolygon(hex){
    const boundary = h3.h3ToGeoBoundary(hex, false);

    const ring = boundary.map(p => [p[1], p[0]]);
    ring.push(ring[0]);

    return turf.polygon([ring]);
  }

  function h3ToWkt(hex){
    const boundary = h3.h3ToGeoBoundary(hex, false);

    const coords = boundary.map(p => {
      const lat = p[0];
      const lng = p[1];
      return `${lng.toFixed(6)} ${lat.toFixed(6)}`;
    });

    coords.push(coords[0]);

    return `POLYGON((${coords.join(", ")}))`;
  }

  function getCandidateHexes(geo){
    const candidates = new Set();

    const searchBuffer = turf.buffer(geo, EDGE_CANDIDATE_BUFFER_METRES, {
      units:'meters'
    });

    const bbox = turf.bbox(searchBuffer);

    const bboxPolygonCoords = [[
      [bbox[0], bbox[1]],
      [bbox[2], bbox[1]],
      [bbox[2], bbox[3]],
      [bbox[0], bbox[3]],
      [bbox[0], bbox[1]]
    ]];

    const hexes = h3.polyfill(
      bboxPolygonCoords,
      H3_RESOLUTION,
      true
    );

    hexes.forEach(h => candidates.add(h));

    return candidates;
  }

  function selectIntersectingHexes(geo){
    clearHexes();

    const candidates = getCandidateHexes(geo);

    candidates.forEach(hex => {
      const hexPoly = hexToTurfPolygon(hex);

      if(turf.booleanIntersects(hexPoly, geo)){
        selectedHexes.add(hex);
        drawHex(hex);
      }
    });

    updateUI();
  }

  function renderLineSelection(lineGeo){
    if(bufferLayer){
      map.removeLayer(bufferLayer);
      bufferLayer = null;
    }

    const bufferValue = parseFloat(bufferSelect.value);

    const buffered = turf.buffer(lineGeo, bufferValue, {
      units:'meters'
    });

    bufferLayer = L.geoJSON(buffered, {
      style:{
        color:'#d12b2b',
        weight:2,
        fillColor:'#d12b2b',
        fillOpacity:0.18
      }
    }).addTo(map);

    selectedGeometry = buffered;

    updateSelectedArea(buffered);
    selectIntersectingHexes(buffered);

    currentQuote = null;
    quoteRefText.innerText = "Not created";
    quoteStatus.innerText = "";
    retrieveLinkInput.value = "";
    retrieveLinkBox.classList.add("hidden");
    orderSection.classList.add("hidden");
  }

  function redrawSketch(){
    if(currentSketchLayer){
      map.removeLayer(currentSketchLayer);
      currentSketchLayer = null;
    }

    if(currentPoints.length === 0) return;

    if(drawMode === "line"){
      if(currentPoints.length === 1){
        currentSketchLayer = L.circleMarker(currentPoints[0], {
          radius:5,
          color:'#d12b2b',
          fillColor:'#d12b2b',
          fillOpacity:1
        }).addTo(map);
      }

      if(currentPoints.length > 1){
        currentSketchLayer = L.polyline(currentPoints, {
          color:'#d12b2b',
          weight:3
        }).addTo(map);
      }
    }

    if(drawMode === "polygon"){
      if(currentPoints.length === 1){
        currentSketchLayer = L.circleMarker(currentPoints[0], {
          radius:5,
          color:'#d12b2b',
          fillColor:'#d12b2b',
          fillOpacity:1
        }).addTo(map);
      }

      if(currentPoints.length > 1){
        currentSketchLayer = L.polygon(currentPoints, {
          color:'#d12b2b',
          weight:3,
          fillColor:'#d12b2b',
          fillOpacity:0.08
        }).addTo(map);
      }
    }
  }

  function startDrawing(mode){
    clearAll();
    drawMode = mode;
    currentPoints = [];
    updateModeUI();
  }

  function finishDrawing(){
    if(drawMode === "polygon"){
      if(currentPoints.length < 3){
        alert("Please add at least 3 points for a polygon.");
        return;
      }

      if(currentSketchLayer){
        map.removeLayer(currentSketchLayer);
        currentSketchLayer = null;
      }

      drawnLayer = L.polygon(currentPoints, {
        color:'#d12b2b',
        weight:3,
        fillColor:'#d12b2b',
        fillOpacity:0.08
      }).addTo(map);

      const ring = currentPoints.map(p => [p.lng, p.lat]);
      ring.push(ring[0]);

      const geo = turf.polygon([ring]);

      lastLineGeo = null;
      selectedGeometry = geo;

      updateSelectedArea(geo);
      selectIntersectingHexes(geo);

      currentQuote = null;
      quoteRefText.innerText = "Not created";
      quoteStatus.innerText = "";
      retrieveLinkInput.value = "";
      retrieveLinkBox.classList.add("hidden");
      orderSection.classList.add("hidden");
    }

    if(drawMode === "line"){
      if(currentPoints.length < 2){
        alert("Please add at least 2 points for a line.");
        return;
      }

      if(currentSketchLayer){
        map.removeLayer(currentSketchLayer);
        currentSketchLayer = null;
      }

      drawnLayer = L.polyline(currentPoints, {
        color:'#d12b2b',
        weight:3
      }).addTo(map);

      const coords = currentPoints.map(p => [p.lng, p.lat]);
      const line = turf.lineString(coords);

      lastLineGeo = line;

      renderLineSelection(line);
    }

    drawMode = null;
    currentPoints = [];
    updateModeUI();
  }

  function generateQuoteRef(){
    const year = new Date().getFullYear();
    const timePart = Date.now().toString().slice(-6);
    const randomPart = Math.floor(Math.random() * 900 + 100);
    return `LSBUD-LS-${year}-${timePart}${randomPart}`;
  }

  function buildTiles(quoteRef){
    const hexes = Array.from(selectedHexes).sort();

    return hexes.map((hex, index) => {
      const number = index + 1;
      const padded = String(number).padStart(3, "0");

      return {
        tileNumber: number,
        tileRef: `${quoteRef}-${padded}`,
        quoteRef: quoteRef,
        h3Index: hex,
        wkt: h3ToWkt(hex)
      };
    });
  }

  function buildQuoteObject(status){
    const quoteRef = currentQuote ? currentQuote.quoteRef : generateQuoteRef();

    const count = selectedHexes.size;
    const total = Math.round(calculatePrice(count));

    return {
      quoteRef: quoteRef,
      status: status,
      email: document.getElementById("quoteEmail").value,
      createdAt: new Date().toISOString(),
      selectedAreaSqKm: parseFloat(selectedArea.innerText),
      tileCount: count,
      priceBand: getPriceBand(count),
      unitPrice: getUnitPrice(count),
      quoteTotal: total,
      bufferMeters: lastLineGeo ? parseFloat(bufferSelect.value) : null,
      geometryType: lastLineGeo ? "line-buffer" : "polygon",
      geometry: selectedGeometry,
      lineGeometry: lastLineGeo,
      mapCenter: map.getCenter(),
      mapZoom: map.getZoom(),
      hexes: Array.from(selectedHexes).sort(),
      tiles: buildTiles(quoteRef)
    };
  }

  function storeQuote(quote){
    localStorage.setItem(`quote_${quote.quoteRef}`, JSON.stringify(quote));
  }

  function getRetrieveLink(quoteRef){
    return `${location.origin}${location.pathname}?quote=${quoteRef}`;
  }

  function showRetrieveLink(quoteRef){
    retrieveLinkInput.value = getRetrieveLink(quoteRef);
    retrieveLinkBox.classList.remove("hidden");
  }

  function showQuote(quote){
    currentQuote = quote;
    quoteRefText.innerText = quote.quoteRef;
    quoteStatus.innerText = `Quote ${quote.status}. ${quote.tileCount} tiles. Total £${quote.quoteTotal}.`;
    showRetrieveLink(quote.quoteRef);
  }

  function saveQuote(){
    if(selectedHexes.size === 0){
      alert("Please draw a polygon or line before saving a quote.");
      return;
    }

    const quote = buildQuoteObject("Saved");
    storeQuote(quote);
    showQuote(quote);

    if(quote.email){
      const subject = encodeURIComponent(`LSBUD Large Site Quote ${quote.quoteRef}`);
      const body = encodeURIComponent(
        `Your quote reference is ${quote.quoteRef}\n\n` +
        `Selected Area: ${quote.selectedAreaSqKm} sq km\n` +
        `Tiles: ${quote.tileCount}\n` +
        `Quote Total: £${quote.quoteTotal}\n\n` +
        `Retrieve quote:\n${getRetrieveLink(quote.quoteRef)}`
      );

      window.location.href = `mailto:${quote.email}?subject=${subject}&body=${body}`;
    }
  }

  function acceptQuote(){
    if(selectedHexes.size === 0){
      alert("Please draw a polygon or line before accepting a quote.");
      return;
    }

    const quote = buildQuoteObject("Accepted");
    storeQuote(quote);
    showQuote(quote);

    document.getElementById("contactEmail").value = quote.email || "";
    orderSection.classList.remove("hidden");
  }

  function buildOrderPayload(){
    if(!currentQuote){
      currentQuote = buildQuoteObject("Accepted");
      storeQuote(currentQuote);
      showQuote(currentQuote);
    }

    return {
      quote: currentQuote,
      searchDetails: {
        organisation: document.getElementById("organisation").value,
        contactName: document.getElementById("contactName").value,
        contactEmail: document.getElementById("contactEmail").value,
        contactPhone: document.getElementById("contactPhone").value,
        projectRef: document.getElementById("projectRef").value,
        category: document.getElementById("category").value,
        workType: document.getElementById("workType").value,
        plannedDate: document.getElementById("plannedDate").value,
        notes: document.getElementById("notes").value,
        paymentMethod: document.getElementById("paymentMethod").value
      },
      oneCallExport: currentQuote.tiles.map(tile => ({
        quoteRef: tile.quoteRef,
        tileNumber: tile.tileNumber,
        tileRef: tile.tileRef,
        h3Index: tile.h3Index,
        geometryWkt: tile.wkt
      }))
    };
  }

  function downloadJson(filename, object){
    const blob = new Blob([JSON.stringify(object, null, 2)], {
      type:"application/json"
    });

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");

    link.href = url;
    link.download = filename;
    link.click();

    URL.revokeObjectURL(url);
  }

  function downloadQuote(){
    if(!currentQuote){
      if(selectedHexes.size === 0){
        alert("Please create a quote first.");
        return;
      }

      currentQuote = buildQuoteObject("Draft");
      storeQuote(currentQuote);
      showQuote(currentQuote);
    }

    downloadJson(`${currentQuote.quoteRef}.json`, currentQuote);
  }

  function createOrder(){
    const payload = buildOrderPayload();

    currentQuote.status = payload.searchDetails.paymentMethod === "BACS"
      ? "Invoice Requested"
      : "Awaiting Card Payment";

    storeQuote(currentQuote);
    showQuote(currentQuote);

    alert(
      `Order created for ${currentQuote.quoteRef}.\n\n` +
      `Payment method: ${payload.searchDetails.paymentMethod}\n` +
      `Use Download OneCall Payload to export the service delivery data.`
    );
  }

  function downloadOneCallPayload(){
    const payload = buildOrderPayload();
    downloadJson(`${payload.quote.quoteRef}-onecall-payload.json`, payload);
  }

  function parseEastingNorthing(input){
    const cleaned = input
      .replace(/,/g, " ")
      .replace(/[ENen]/g, " ")
      .trim();

    const parts = cleaned
      .split(/\s+/)
      .map(Number)
      .filter(n => !isNaN(n));

    if(parts.length < 2) return null;

    const easting = parts[0];
    const northing = parts[1];

    if(easting < 0 || easting > 700000) return null;
    if(northing < 0 || northing > 1300000) return null;

    const lonLat = proj4("EPSG:27700", "EPSG:4326", [easting, northing]);

    return {
      lat: lonLat[1],
      lon: lonLat[0],
      easting: easting,
      northing: northing
    };
  }

  function loadQuoteFromUrl(){
    const params = new URLSearchParams(location.search);
    const quoteRef = params.get("quote");

    if(!quoteRef) return;

    const stored = localStorage.getItem(`quote_${quoteRef}`);

    if(!stored){
      alert("Quote not found in this browser session.");
      return;
    }

    clearAll();

    const quote = JSON.parse(stored);
    currentQuote = quote;

    if(quote.mapCenter && quote.mapZoom){
      map.setView([quote.mapCenter.lat, quote.mapCenter.lng], quote.mapZoom);
    }

    if(quote.geometryType === "polygon" && quote.geometry){
      drawnLayer = L.geoJSON(quote.geometry, {
        style:{
          color:'#d12b2b',
          weight:3,
          fillColor:'#d12b2b',
          fillOpacity:0.08
        }
      }).addTo(map);

      selectedGeometry = quote.geometry;
      map.fitBounds(drawnLayer.getBounds());
    }

    if(quote.geometryType === "line-buffer" && quote.lineGeometry){
      drawnLayer = L.geoJSON(quote.lineGeometry, {
        style:{
          color:'#d12b2b',
          weight:3
        }
      }).addTo(map);

      lastLineGeo = quote.lineGeometry;

      if(quote.bufferMeters){
        bufferSelect.value = quote.bufferMeters;

        const buffered = turf.buffer(quote.lineGeometry, quote.bufferMeters, {
          units:'meters'
        });

        bufferLayer = L.geoJSON(buffered, {
          style:{
            color:'#d12b2b',
            weight:2,
            fillColor:'#d12b2b',
            fillOpacity:0.18
          }
        }).addTo(map);

        selectedGeometry = buffered;
        map.fitBounds(bufferLayer.getBounds());
      }
    }

    quote.hexes.forEach(hex => {
      selectedHexes.add(hex);
      drawHex(hex);
    });

    selectedArea.innerText = quote.selectedAreaSqKm.toFixed(3);
    updateUI();
    showQuote(quote);
  }

  map.on("click", function(e){
    if(!drawMode) return;

    currentPoints.push(e.latlng);
    redrawSketch();
  });

  map.on("dblclick", function(e){
    if(!drawMode) return;

    L.DomEvent.stop(e);
    finishDrawing();
  });

  drawPolygonBtn.onclick = function(){
    startDrawing("polygon");
  };

  drawLineBtn.onclick = function(){
    startDrawing("line");
  };

  document.getElementById("finishBtn").onclick = function(){
    finishDrawing();
  };

  document.getElementById("clearBtn").onclick = function(){
    clearAll();
  };

  bufferSelect.onchange = function(){
    if(lastLineGeo){
      renderLineSelection(lastLineGeo);
    }
  };

  document.getElementById("findBtn").onclick = function(){
    const query = document.getElementById("searchBox").value.trim();

    const en = parseEastingNorthing(query);

    if(en){
      map.setView([en.lat, en.lon], 15);

      if(searchMarker){
        map.removeLayer(searchMarker);
      }

      searchMarker = L.marker([en.lat, en.lon]).addTo(map);
      return;
    }

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
      .then(response => response.json())
      .then(data => {
        if(!data.length) return;

        const lat = parseFloat(data[0].lat);
        const lon = parseFloat(data[0].lon);

        map.setView([lat, lon], 15);

        if(searchMarker){
          map.removeLayer(searchMarker);
        }

        searchMarker = L.marker([lat, lon]).addTo(map);
      });
  };

  document.getElementById("saveQuoteBtn").onclick = function(){
    saveQuote();
  };

  document.getElementById("acceptQuoteBtn").onclick = function(){
    acceptQuote();
  };

  document.getElementById("copyRetrieveLinkBtn").onclick = function(){
    const link = retrieveLinkInput.value;

    if(!link){
      return;
    }

    if(navigator.clipboard){
      navigator.clipboard.writeText(link).then(() => {
        quoteStatus.innerText = "Retrieve link copied to clipboard.";
      });
    } else {
      retrieveLinkInput.select();
      document.execCommand("copy");
      quoteStatus.innerText = "Retrieve link copied to clipboard.";
    }
  };

  document.getElementById("downloadQuoteBtn").onclick = function(){
    downloadQuote();
  };

  document.getElementById("createOrderBtn").onclick = function(){
    createOrder();
  };

  document.getElementById("downloadPayloadBtn").onclick = function(){
    downloadOneCallPayload();
  };

  updateModeUI();
  loadQuoteFromUrl();

  setTimeout(function(){
    map.invalidateSize();
  }, 200);

  console.log("LSBUD large site prototype initialised");
}

initApp();
</script>

</body>
</html>
