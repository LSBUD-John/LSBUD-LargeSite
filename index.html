<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hex Site Selection</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />


const hexGroup = L.layerGroup().addTo(map);
const bufferGroup = L.layerGroup().addTo(map);
  
  <style>
    body {
      margin:0;
      font-family: Arial;
    }

    #map {
      height:100vh;
      width:100%;
    }

    #panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 300px;
      padding: 20px;
      background: rgba(255,255,255,0.95);
      z-index: 10000;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      border-radius: 8px;
    }

    input, select {
      width:100%;
      padding:8px;
      margin-bottom:10px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    .leaflet-tile {
      filter: grayscale(100%) brightness(90%);
    }
  </style>
</head>

<body>

<div id="panel">
  <h2>Search</h2>

  <label>Buffer (line only)</label>
  <select id="buffer">
    <option value="25">25m</option>
    <option value="50">50m</option>
    <option value="75">75m</option>
    <option value="100">100m</option>
  </select>

  <p style="font-size:12px;">
    Polygon: click first point to close<br>
    Line: double-click to finish
  </p>

  <h3>Result</h3>
  <p>Tiles: <span id="tileCount">0</span></p>
  <p>Quote: £<span id="quote">0</span></p>

  <button onclick="clearAll()">Clear Selection</button>
</div>

<div id="map"></div>

<!-- JS LIBS (correct order) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2/dist/h3-js.umd.js"></script>

<script>

// ✅ Map init
const map = L.map('map').setView([52.48, -1.89], 13);
map.doubleClickZoom.disable();

// ✅ Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ✅ Drawing layer
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// ✅ Draw control
const drawControl = new L.Control.Draw({
  draw: {
    polygon: true,
    polyline: true,
    rectangle: false,
    circle: false,
    marker: false
  },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

// ✅ Storage
let selectedHexes = new Set();

// ✅ Pricing
function calculatePrice(count){
  return (count * 2.99).toFixed(0);
}

function updateUI(){
  document.getElementById("tileCount").innerText = selectedHexes.size;
  document.getElementById("quote").innerText = calculatePrice(selectedHexes.size);
}

// ✅ Clear hexes
function clearHexes(){
hexGroup.clearLayers(); // ✅ bulletproof
  selectedHexes.clear();
}

 bufferGroup.clearLayers();

L.geoJSON(geojson, {
  style: {
    color: "red",
    fillOpacity: 0.15,
    weight: 2
  }
}).addTo(bufferGroup);

// ✅ FULL CLEAR (FIXED)
function clearAll(){
drawnItems.clearLayers();
  hexGroup.clearLayers();      // ✅ clears all hexes
  bufferGroup.clearLayers();   // ✅ clears buffer
  selectedHexes.clear();
  updateUI();
}

  updateUI();
}

// ✅ Draw hex (IMPROVED VISUALS)
function drawHex(hex){
  const boundary = h3.h3ToGeoBoundary(hex, false);

  const latlngs = boundary.map(coord => [coord[0], coord[1]]);

  return L.polygon(latlngs, {
    color:"#1f4e79",
    weight:0.5,
    fillColor:"#4a90e2",
    fillOpacity:0.35,
    lineJoin:"round",
    smoothFactor:1
  }).addTo(hexGroup); // ✅ key change
}

// ✅ Process geometry
function processGeometry(geojson){

  clearHexes();

  const hexes = h3.polyfill(geojson.geometry.coordinates, 9);

  hexes.forEach(h=>{
    selectedHexes.add(h);
    hexLayers.push(drawHex(h));
  });

  updateUI();
}

// ✅ Draw handler
map.on('draw:created', function(e){

  drawnItems.clearLayers();
  clearHexes();

  if (bufferLayer) {
    map.removeLayer(bufferLayer);
    bufferLayer = null;
  }

  const layer = e.layer;
  drawnItems.addLayer(layer);

  let geojson;

  if (e.layerType === "polygon") {
    geojson = layer.toGeoJSON();
  }

  if (e.layerType === "polyline") {
    const line = layer.toGeoJSON();
    const buffer = parseFloat(document.getElementById("buffer").value);

    geojson = turf.buffer(line, buffer, { units: 'meters' });

    // ✅ track buffer layer
    bufferLayer = L.geoJSON(geojson, {
      style: {
        color: "red",
        fillOpacity: 0.15,
        weight: 2
      }
    }).addTo(map);
  }

  processGeometry(geojson);

  // ✅ exit draw mode
  drawControl._toolbars.draw.disable();
});

</script>

</body>
</html>
